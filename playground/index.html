<!DOCTYPE html>
<html>
<head>
  <title>Network Playground</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #debug {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 400px;
      max-height: 90vh;
      overflow: auto;
      font-size: 11px;
      background: rgba(245, 245, 245, 0.9);
      padding: 10px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <pre id="debug"></pre>
  <script type="module" src="./playground.js"></script>
</body>
</html>
