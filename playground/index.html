<!DOCTYPE html>
<html>
<head>
  <title>Mars Colony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 240px;
      background: rgba(20, 20, 30, 0.85);
      color: #ddd;
      padding: 16px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
    #panel h3 { color: #e8a050; margin-bottom: 8px; }
    #panel .stats { color: #888; margin-bottom: 12px; line-height: 1.6; }
    #panel .selection { color: #6ab0f3; margin-bottom: 12px; }
    #panel button {
      display: block;
      width: 100%;
      padding: 6px;
      margin-bottom: 6px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    #panel button:hover { background: #444; }
    #panel .results { margin-top: 8px; color: #8d8; line-height: 1.6; }
    #debug {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 400px;
      max-height: 90vh;
      overflow: auto;
      font-size: 11px;
      background: rgba(245, 245, 245, 0.9);
      padding: 10px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <h3>Mars Colony</h3>
    <div style="margin-bottom: 8px;">
      <div style="margin-bottom: 4px;">
        <label style="color: #888;">Modules:</label>
        <input id="node-count" type="number" value="10" min="3" max="50" style="width: 50px; background: #444; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-family: monospace;">
      </div>
      <div style="margin-bottom: 4px;">
        <label style="color: #888;">Weight &sigma;:</label>
        <input id="weight-dev" type="number" value="15" min="0" max="100" step="1" style="width: 50px; background: #444; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-family: monospace;">
      </div>
      <div style="margin-bottom: 4px;">
        <label style="color: #888;">Capacity &mu;:</label>
        <input id="cap-mean" type="number" value="50" min="1" max="500" step="1" style="width: 50px; background: #444; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-family: monospace;">
      </div>
      <div style="margin-bottom: 4px;">
        <label style="color: #888;">Capacity &sigma;:</label>
        <input id="cap-dev" type="number" value="10" min="0" max="100" step="1" style="width: 50px; background: #444; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-family: monospace;">
      </div>
      <div style="margin-bottom: 4px;">
        <label style="color: #888;">Obstacle P:</label>
        <input id="obstacle-prob" type="number" value="0.2" min="0" max="1" step="0.05" style="width: 50px; background: #444; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; font-family: monospace;">
      </div>
      <button id="btn-generate">Generate</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="selection" id="selection">Click a module to select</div>
    <button id="btn-mst">Show Roads (MST)</button>
    <button id="btn-route" style="display:none">Find Supply Route</button>
    <button id="btn-flow">Max Throughput</button>
    <button id="btn-critical">Critical Infrastructure</button>
    <button id="btn-destroy">Destroy Mode</button>
    <button id="btn-restore">Restore Graph</button>
    <button id="btn-reset">Reset</button>
    <div class="results" id="results"></div>
    <hr style="border-color: #444; margin: 8px 0;">
    <label style="color:#aaa;font-size:11px;display:block;margin:4px 0;cursor:pointer;">
      <input type="checkbox" id="chk-distance"> Show distance
    </label>
    <label style="color:#aaa;font-size:11px;display:block;margin:4px 0;cursor:pointer;">
      <input type="checkbox" id="chk-capacity"> Show capacity
    </label>
    <div style="color: #777; font-size: 10px; line-height: 1.6;">
      Edge label: distance|capacity<br>
      With flow: distance|flow/capacity
    </div>
  </div>
  <pre id="debug"></pre>
  <script type="module" src="./playground.js"></script>
</body>
</html>
