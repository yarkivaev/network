<!DOCTYPE html>
<html>
<head>
  <title>Mars Colony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 240px;
      background: rgba(20, 20, 30, 0.85);
      color: #ddd;
      padding: 16px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
    #panel h3 { color: #e8a050; margin-bottom: 8px; }
    #panel .stats { color: #888; margin-bottom: 12px; line-height: 1.6; }
    #panel .selection { color: #6ab0f3; margin-bottom: 12px; }
    #panel button {
      display: block;
      width: 100%;
      padding: 6px;
      margin-bottom: 6px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
    }
    #panel button:hover { background: #444; }
    #panel .results { margin-top: 8px; color: #8d8; line-height: 1.6; }
    #debug {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 400px;
      max-height: 90vh;
      overflow: auto;
      font-size: 11px;
      background: rgba(245, 245, 245, 0.9);
      padding: 10px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <h3>Mars Colony</h3>
    <div class="stats" id="stats"></div>
    <div class="selection" id="selection">Click a module to select</div>
    <button id="btn-mst">Build Roads (MST)</button>
    <button id="btn-route">Find Supply Route</button>
    <button id="btn-flow">Max Throughput</button>
    <button id="btn-critical">Critical Infrastructure</button>
    <button id="btn-reset">Reset</button>
    <div class="results" id="results"></div>
  </div>
  <pre id="debug"></pre>
  <script type="module" src="./playground.js"></script>
</body>
</html>
